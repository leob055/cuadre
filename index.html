<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cuadre Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #fbbf24;
            --success: #22c55e;
            --danger: #ef4444;
            --whatsapp: #25d366;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        .column {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        .column-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .total-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        .results-panel {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .final-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid;
        }

        .sum-card { border-color: var(--success); }
        .rest-card { border-color: var(--secondary); }

        .final-val {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 10px;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .btn-ws { background: var(--whatsapp); color: white; }
        .btn-clear { background: var(--danger); color: white; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Control de Caja</h1>

    <div class="grid">
        <div class="column">
            <div class="column-title">Efectivo 💵</div>
            <div class="input-group"><label>Gabeta</label><input type="number" id="gabeta" class="left-input" oninput="calcular()"></div>
            <div class="input-group"><label>Monedas</label><input type="number" id="monedas" class="left-input" oninput="calcular()"></div>
            <div class="input-group"><label>Fiados</label><input type="number" id="fiados" class="left-input" oninput="calcular()"></div>
            <div class="input-group"><label>Premios</label><input type="number" id="premios" class="left-input" oninput="calcular()"></div>
            <div class="total-box">Total Izq: <span id="totalLeft">0.00</span></div>
        </div>

        <div class="column">
            <div class="column-title">Operaciones 📊</div>
            <div class="input-group"><label>Lotería</label><input type="number" id="loteria" class="right-input" oninput="calcular()"></div>
            <div class="input-group"><label>Parlay</label><input type="number" id="parlay" class="right-input" oninput="calcular()"></div>
            <div class="input-group"><label>Leo</label><input type="number" id="leo" class="right-input" oninput="calcular()"></div>
            <div class="input-group"><label>Pagos</label><input type="number" id="pagos" class="right-input" oninput="calcular()"></div>
            <div class="total-box">Total Der: <span id="totalRight">0.00</span></div>
        </div>
    </div>

    <div class="results-panel">
        <div class="final-card sum-card">
            <span style="color: var(--success)">SUMA TOTALES</span>
            <span class="final-val" id="grandSum">0.00</span>
        </div>
        <div class="final-card rest-card">
            <span style="color: var(--secondary)">DIFERENCIA (RESTA)</span>
            <span class="final-val" id="grandDiff">0.00</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-ws" onclick="enviarWhatsApp()">ENVIAR POR WHATSAPP ✅</button>
        <button class="btn-clear" onclick="limpiar()">LIMPIAR TODO</button>
    </div>
</div>

<script>
    function calcular() {
        let leftInputs = document.querySelectorAll('.left-input');
        let rightInputs = document.querySelectorAll('.right-input');
        
        let sumLeft = 0;
        leftInputs.forEach(input => sumLeft += Number(input.value) || 0);

        let sumRight = 0;
        rightInputs.forEach(input => sumRight += Number(input.value) || 0);

        document.getElementById('totalLeft').innerText = sumLeft.toFixed(2);
        document.getElementById('totalRight').innerText = sumRight.toFixed(2);
        document.getElementById('grandSum').innerText = (sumLeft + sumRight).toFixed(2);
        document.getElementById('grandDiff').innerText = (sumLeft - sumRight).toFixed(2);
    }

    function enviarWhatsApp() {
        // Obtener valores
        const v = (id) => document.getElementById(id).value || "0.00";
        const tl = document.getElementById('totalLeft').innerText;
        const tr = document.getElementById('totalRight').innerText;
        const suma = document.getElementById('grandSum').innerText;
        const resta = document.getElementById('grandDiff').innerText;
        const fecha = new Date().toLocaleDateString();

        // Crear mensaje formateado
        let mensaje = `*CIERRE DE CAJA - ${fecha}*%0A%0A`;
        mensaje += `*EFECTIVO:*%0A`;
        mensaje += `- Gabeta: ${v('gabeta')}%0A`;
        mensaje += `- Monedas: ${v('monedas')}%0A`;
        mensaje += `- Fiados: ${v('fiados')}%0A`;
        mensaje += `- Premios: ${v('premios')}%0A`;
        mensaje += `*TOTAL IZQ: ${tl}*%0A%0A`;
        
        mensaje += `*OPERACIONES:*%0A`;
        mensaje += `- Lotería: ${v('loteria')}%0A`;
        mensaje += `- Parlay: ${v('parlay')}%0A`;
        mensaje += `- Leo: ${v('leo')}%0A`;
        mensaje += `- Pagos: ${v('pagos')}%0A`;
        mensaje += `*TOTAL DER: ${tr}*%0A%0A`;
        
        mensaje += `--------------------------%0A`;
        mensaje += `*SUMA TOTALES:* ${suma}%0A`;
        mensaje += `*DIFERENCIA:* ${resta}%0A`;
        mensaje += `--------------------------`;

        // Abrir WhatsApp
        window.open(`https://wa.me/?text=${mensaje}`, '_blank');
    }

    function limpiar() {
        if(confirm('¿Limpiar todos los datos?')) {
            document.querySelectorAll('input').forEach(input => input.value = '');
            calcular();
        }
    }
</script>

</body>
</html>
