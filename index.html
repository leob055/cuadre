<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cuadre ZAEB</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #fbbf24;
            --success: #22c55e;
            --danger: #ef4444;
            --whatsapp: #25d366;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        .column {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .column-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
            font-weight: bold;
        }

        .input-group { margin-bottom: 10px; }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .total-box {
            margin-top: 15px;
            padding: 10px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
        }

        .results-panel {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .final-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid;
        }

        .sum-card { border-color: var(--success); }
        .rest-card { border-color: var(--secondary); }

        .final-val {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 5px;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            color: white;
        }

        .btn-ws { background: var(--whatsapp); }
        .btn-clear { background: var(--danger); opacity: 0.8; }

        /* Estilos Calculadora */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .btn-calc { background: #334155; padding: 12px; font-size: 1.2rem; }
        .btn-op { background: var(--primary); }
        .display-calc {
            grid-column: span 4;
            background: #000;
            color: var(--secondary);
            font-family: monospace;
            font-size: 1.8rem;
            text-align: right;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--secondary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Control de Caja</h1>

    <div class="grid">
        <div class="column">
            <div class="column-title">Efectivo 💵</div>
            <div class="input-group"><label>Gabeta</label><input type="number" id="gabeta" oninput="calcular()"></div>
            <div class="input-group"><label>Monedas</label><input type="number" id="monedas" oninput="calcular()"></div>
            <div class="input-group"><label>Fiados</label><input type="number" id="fiados" oninput="calcular()"></div>
            <div class="input-group"><label>Premios</label><input type="number" id="premios" oninput="calcular()"></div>
            <div class="total-box">Total Izq: <span id="totalLeft">0.00</span></div>
        </div>

        <div class="column">
            <div class="column-title">Operaciones 📊</div>
            <div class="input-group"><label>Lotería</label><input type="number" id="loteria" oninput="calcular()"></div>
            <div class="input-group"><label>Parlay</label><input type="number" id="parlay" oninput="calcular()"></div>
            <div class="input-group"><label>Leo</label><input type="number" id="leo" oninput="calcular()"></div>
            <div class="input-group"><label>Pagos</label><input type="number" id="pagos" oninput="calcular()"></div>
            <div class="total-box">Total Der: <span id="totalRight">0.00</span></div>
        </div>
    </div>

    <div class="results-panel">
        <div class="final-card sum-card">
            <span style="color: var(--success)">SUMA TOTALES</span>
            <span class="final-val" id="grandSum">0.00</span>
        </div>
        <div class="final-card rest-card">
            <span style="color: var(--secondary)">DIFERENCIA</span>
            <span class="final-val" id="grandDiff">0.00</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-ws" onclick="enviarWhatsApp()">ENVIAR POR WHATSAPP ✅</button>
        <button class="btn-clear" onclick="limpiar()">LIMPIAR TODO</button>
    </div>

    <div class="column" style="margin-top: 30px; background: #0f172a; border: 1px dashed var(--secondary);">
        <div class="column-title" style="color: var(--secondary); border-color: var(--secondary);">Calculadora Auxiliar</div>
        <div id="display" class="display-calc">0</div>
        <div class="calc-grid">
            <button class="btn-calc" onclick="add('7')">7</button>
            <button class="btn-calc" onclick="add('8')">8</button>
            <button class="btn-calc" onclick="add('9')">9</button>
            <button class="btn-calc btn-op" onclick="add('/')">/</button>
            
            <button class="btn-calc" onclick="add('4')">4</button>
            <button class="btn-calc" onclick="add('5')">5</button>
            <button class="btn-calc" onclick="add('6')">6</button>
            <button class="btn-calc btn-op" onclick="add('*')">*</button>
            
            <button class="btn-calc" onclick="add('1')">1</button>
            <button class="btn-calc" onclick="add('2')">2</button>
            <button class="btn-calc" onclick="add('3')">3</button>
            <button class="btn-calc btn-op" onclick="add('-')">-</button>
            
            <button class="btn-calc" style="background: var(--danger)" onclick="cls()">C</button>
            <button class="btn-calc" onclick="add('0')">0</button>
            <button class="btn-calc" style="background: var(--success)" onclick="res()">=</button>
            <button class="btn-calc btn-op" onclick="add('+')">+</button>
        </div>
    </div>
</div>

<script>
    function calcular() {
        const idsLeft = ['gabeta', 'monedas', 'fiados', 'premios'];
        const idsRight = ['loteria', 'parlay', 'leo', 'pagos'];
        
        let sumL = idsLeft.reduce((acc, id) => acc + (Number(document.getElementById(id).value) || 0), 0);
        let sumR = idsRight.reduce((acc, id) => acc + (Number(document.getElementById(id).value) || 0), 0);

        document.getElementById('totalLeft').innerText = sumL.toFixed(2);
        document.getElementById('totalRight').innerText = sumR.toFixed(2);
        document.getElementById('grandSum').innerText = (sumL + sumR).toFixed(2);
        document.getElementById('grandDiff').innerText = (sumL - sumR).toFixed(2);
    }

    function enviarWhatsApp() {
        const v = (id) => document.getElementById(id).value || "0.00";
        const tl = document.getElementById('totalLeft').innerText;
        const tr = document.getElementById('totalRight').innerText;
        const suma = document.getElementById('grandSum').innerText;
        const resta = document.getElementById('grandDiff').innerText;
        const fecha = new Date().toLocaleDateString();

        let m = `*CIERRE DE CAJA - ${fecha}*%0A%0A`;
        m += `*EFECTIVO:*%0A- Gabeta: ${v('gabeta')}%0A- Monedas: ${v('monedas')}%0A- Fiados: ${v('fiados')}%0A- Premios: ${v('premios')}%0A*TOTAL: ${tl}*%0A%0A`;
        m += `*OPERACIONES:*%0A- Lotería: ${v('loteria')}%0A- Parlay: ${v('parlay')}%0A- Leo: ${v('leo')}%0A- Pagos: ${v('pagos')}%0A*TOTAL: ${tr}*%0A%0A`;
        m += `*SUMA TOTALES: ${suma}*%0A*DIFERENCIA: ${resta}*`;

        window.open(`https://wa.me/?text=${m}`, '_blank');
    }

    function limpiar() {
        if(confirm('¿Borrar todo?')) {
            document.querySelectorAll('input').forEach(i => i.value = '');
            calcular();
        }
    }

    // Funciones Calculadora
    let disp = document.getElementById('display');
    function add(v) { if(disp.innerText === '0' || disp.innerText === 'Error') disp.innerText = v; else disp.innerText += v; }
    function cls() { disp.innerText = '0'; }
    function res() { 
        try { disp.innerText = eval(disp.innerText); } 
        catch { disp.innerText = 'Error'; setTimeout(cls, 1000); } 
    }
</script>

</body>
</html>
